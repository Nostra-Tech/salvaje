name: SALVAJE Cron Reminders

on:
  # Runs every hour. The script itself checks Bogotá time and only acts on the right hour/day.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run reminders
        env:
          SALVAJE_API_KEY:    ${{ secrets.SALVAJE_API_KEY }}
          SALVAJE_PROJECT:    ${{ secrets.SALVAJE_PROJECT }}
          SALVAJE_ADMIN_EMAIL: ${{ secrets.SALVAJE_ADMIN_EMAIL }}
          SALVAJE_ADMIN_PASS:  ${{ secrets.SALVAJE_ADMIN_PASS }}
        run: node cron/send-reminders.mjs
